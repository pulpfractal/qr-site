<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Strategy Puzzle 2</title>

  <style>
    :root {
      --teal: #20d6c7;
      --purple: #8d5cff;
      --panel: rgba(3, 18, 32, 0.78);
      --text: #d7fff9;
      --danger: #ff6b9a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(32, 214, 199, 0.22), transparent 28%),
        radial-gradient(circle at 85% 15%, rgba(141, 92, 255, 0.28), transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(32, 214, 199, 0.14), transparent 35%),
        linear-gradient(135deg, #020817 0%, #041b2d 38%, #180a2e 70%, #031f2d 100%);
    }

    .scanlines {
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.025),
        rgba(255,255,255,0.025) 1px,
        transparent 1px,
        transparent 4px
      );
      opacity: 0.45;
    }

    .container {
      width: min(1000px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 4rem 0;
      position: relative;
      z-index: 1;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(32, 214, 199, 0.25);
      border-radius: 18px;
      padding: 2rem;
      text-align: center;
      box-shadow:
        0 0 35px rgba(32, 214, 199, 0.08),
        0 0 55px rgba(141, 92, 255, 0.08);
      backdrop-filter: blur(10px);
    }

    .intro {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .image-row {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .puzzle-image {
      width: 100%;
      max-width: 280px;
      height: 220px;
      object-fit: contain;
      border-radius: 14px;
      border: 1px solid rgba(32, 214, 199, 0.25);
      background: rgba(0, 0, 0, 0.25);
      padding: 0.5rem;
    }

    input {
      width: min(420px, 100%);
      background: rgba(0, 0, 0, 0.24);
      border: 1px solid rgba(32, 214, 199, 0.28);
      color: var(--text);
      padding: 0.8rem;
      font: inherit;
      border-radius: 8px;
      outline: none;
      text-align: center;
    }

    input:focus {
      border-color: rgba(141, 92, 255, 0.8);
      box-shadow: 0 0 10px rgba(141, 92, 255, 0.18);
    }

    button {
      margin-top: 1.2rem;
      padding: 0.8rem 1.3rem;
      border: 1px solid var(--teal);
      background: rgba(32, 214, 199, 0.06);
      color: var(--text);
      cursor: pointer;
      font: inherit;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 8px;
    }

    button:hover {
      box-shadow: 0 0 16px rgba(32, 214, 199, 0.25);
    }

    .feedback {
      margin-top: 1rem;
      min-height: 1.4rem;
      color: var(--danger);
      font-family: monospace;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="scanlines" aria-hidden="true"></div>

  <main class="container">
    <section class="panel">
      <div class="intro">
        Think about all the time you will have once I do all the work for you
      </div>

      <div class="image-row">
        <img class="puzzle-image" src="lilly_pilly.png" alt="Plant clue 1">
        <img class="puzzle-image" src="grevillia.png" alt="Plant clue 2">
        <img class="puzzle-image" src="dryandra.png" alt="Plant clue 3">
      </div>

      <input id="answerInput" type="text" placeholder="Names">

      <button id="submitBtn">Submit</button>
      <p id="feedback" class="feedback"></p>
    </section>
  </main>

  <script>
    const input = document.getElementById("answerInput");
    const feedback = document.getElementById("feedback");
    const submitBtn = document.getElementById("submitBtn");

    function clean(value) {
      return value
        .toLowerCase()
        .replace(/,/g, " ")
        .replace(/-/g, " ")
        .split(/\s+/)
        .filter(Boolean)
        .join(" ");
    }

    function checkAnswer() {
      const answer = clean(input.value);

      const possibleNames = [
        "lilly pilly",
        "grevillia",
        "dryandra",
        "banksia"
      ];

      let count = 0;

      possibleNames.forEach(name => {
        if (answer.includes(name)) {
          count++;
        }
      });

      if (count >= 3) {
        feedback.style.color = "#20d6c7";
        feedback.textContent = "Names accepted.";

        setTimeout(() => {
          window.location.href = "data-strategy-puzzle3.html";
        }, 900);

        return;
      }

      feedback.style.color = "#ff6b9a";
      feedback.textContent = "Incorrect. At least three names are required.";
    }

    submitBtn.addEventListener("click", checkAnswer);

    document.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        checkAnswer();
      }
    });
  </script>
</body>
</html>
