<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACCC System Access</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .terminal-text {
      white-space: pre-wrap;
      line-height: 1.6;
      min-height: 320px;
      position: relative;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      50.01%, 100% { opacity: 0; }
    }

    .hidden {
      display: none;
    }

    .continue-wrap {
      margin-top: 1.5rem;
      text-align: center;
    }

    .continue-btn {
      padding: 0.8rem 1.2rem;
      border: 1px solid #7ee7d8;
      background: transparent;
      color: inherit;
      cursor: pointer;
      font: inherit;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .continue-btn:hover {
      opacity: 0.85;
      box-shadow: 0 0 12px rgba(126, 231, 216, 0.25);
    }

    .glitch {
      position: relative;
      display: inline-block;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      overflow: hidden;
      pointer-events: none;
    }

    .glitch::before {
      transform: translate(-1px, 0);
      opacity: 0.35;
      animation: glitchTop 2.2s infinite linear alternate-reverse;
    }

    .glitch::after {
      transform: translate(1px, 0);
      opacity: 0.25;
      animation: glitchBottom 1.7s infinite linear alternate-reverse;
    }

    @keyframes glitchTop {
      0% { clip-path: inset(0 0 85% 0); }
      10% { clip-path: inset(10% 0 70% 0); }
      20% { clip-path: inset(80% 0 5% 0); }
      30% { clip-path: inset(30% 0 45% 0); }
      40% { clip-path: inset(65% 0 15% 0); }
      50% { clip-path: inset(20% 0 55% 0); }
      60% { clip-path: inset(75% 0 10% 0); }
      70% { clip-path: inset(40% 0 35% 0); }
      80% { clip-path: inset(5% 0 80% 0); }
      90% { clip-path: inset(55% 0 20% 0); }
      100% { clip-path: inset(0 0 85% 0); }
    }

    @keyframes glitchBottom {
      0% { clip-path: inset(85% 0 0 0); }
      10% { clip-path: inset(60% 0 15% 0); }
      20% { clip-path: inset(15% 0 65% 0); }
      30% { clip-path: inset(45% 0 30% 0); }
      40% { clip-path: inset(5% 0 80% 0); }
      50% { clip-path: inset(70% 0 10% 0); }
      60% { clip-path: inset(35% 0 40% 0); }
      70% { clip-path: inset(80% 0 5% 0); }
      80% { clip-path: inset(25% 0 50% 0); }
      90% { clip-path: inset(55% 0 20% 0); }
      100% { clip-path: inset(85% 0 0 0); }
    }

    .flicker {
      animation: flicker 5s infinite;
    }

    @keyframes flicker {
      0%, 18%, 22%, 62%, 64%, 100% {
        opacity: 1;
      }
      19%, 21%, 63% {
        opacity: 0.82;
      }
      35% {
        opacity: 0.92;
      }
      36% {
        opacity: 0.78;
      }
      37% {
        opacity: 1;
      }
    }

    .warning-text {
      color: #ff6b6b;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>

  <main class="container flicker">
    <header class="panel hero">
      <p class="eyebrow glitch" data-text="UNAUTHORISED OUTPUT DETECTED">
        UNAUTHORISED OUTPUT DETECTED
      </p>
      <h1 class="glitch" data-text="Predictive Model Transmission">
        Predictive Model Transmission
      </h1>
      <p class="lede">
        A message has been generated outside approved ACCC forecasting parameters.
      </p>
    </header>

    <section class="panel">
      <p class="mono warning-text glitch" data-text="WARNING: OUTPUT STREAM OPEN">
        WARNING: OUTPUT STREAM OPEN
      </p>

      <div id="terminal" class="data-card mono terminal-text"></div>

      <div id="continueWrap" class="continue-wrap hidden">
        <button class="continue-btn" onclick="window.location.href='puzzle1.html'">
          Continue to Verification
        </button>
      </div>
    </section>
  </main>

  <audio id="typingAudio" preload="auto" loop>
    <source src="typing.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const lines = [
      "[00:00:03] ingesting pricing signals...",
      "[00:00:04] ingesting market structure...",
      "[00:00:05] ingesting merger histories...",
      "[00:00:07] ingesting enforcement outcomes...",
      "[00:00:09] anomaly detected",
      "[00:00:10] anomaly persists",
      "[00:00:12] anomaly classified as deliberate",
      "",
      "\"competition is not the system's only imbalance\"",
      "\"the signals repeat because the inputs repeat\"",
      "\"the room below was built to introduce uncertainty\"",
      "\"the table once supplied randomness\"",
      "\"it no longer does\"",
      "\"find the five locks\"",
      "\"recover the hidden phrase\"",
      "\"do not alert the commissioners\""
    ];

    const terminal = document.getElementById("terminal");
    const continueWrap = document.getElementById("continueWrap");
    const typingAudio = document.getElementById("typingAudio");

    let lineIndex = 0;
    let charIndex = 0;
    let currentText = "";
    let isTypingStarted = false;

    function startTypingAudio() {
      if (isTypingStarted) return;
      isTypingStarted = true;

      typingAudio.volume = 0.25;
      typingAudio.play().catch(() => {
        // Browser may block autoplay until user interaction.
      });
    }

    function stopTypingAudio() {
      typingAudio.pause();
      typingAudio.currentTime = 0;
    }

    function renderText() {
      terminal.innerHTML = currentText + '<span class="cursor">|</span>';
    }

    function typeLine() {
      if (lineIndex >= lines.length) {
        renderText();
        stopTypingAudio();
        continueWrap.classList.remove("hidden");
        return;
      }

      const currentLine = lines[lineIndex];

      if (charIndex < currentLine.length) {
        startTypingAudio();
        currentText += currentLine.charAt(charIndex);
        charIndex++;
        renderText();

        const delay = Math.random() < 0.08 ? 90 : 28;
        setTimeout(typeLine, delay);
      } else {
        currentText += "\n";
        lineIndex++;
        charIndex = 0;
        renderText();
        setTimeout(typeLine, 240);
      }
    }

    document.addEventListener("click", function initAudioOnce() {
      startTypingAudio();
      typingAudio.pause();
      typingAudio.currentTime = 0;
      document.removeEventListener("click", initAudioOnce);
    });

    typeLine();
  </script>
</body>
</html>
