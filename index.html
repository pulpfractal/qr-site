<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACCC System Access</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .terminal-text {
      white-space: pre-wrap;
      line-height: 1.6;
      min-height: 320px;
      position: relative;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      50.01%, 100% { opacity: 0; }
    }

    .hidden {
      display: none;
    }

    .continue-wrap,
    .start-wrap {
      margin-top: 1.5rem;
      text-align: center;
    }

    .continue-btn,
    .start-btn {
      padding: 0.8rem 1.2rem;
      border: 1px solid #7ee7d8;
      background: transparent;
      color: inherit;
      cursor: pointer;
      font: inherit;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .continue-btn:hover,
    .start-btn:hover {
      opacity: 0.85;
      box-shadow: 0 0 12px rgba(126, 231, 216, 0.25);
    }

    .flicker {
      animation: flicker 5s infinite;
    }

    @keyframes flicker {
      0%, 18%, 22%, 62%, 64%, 100% {
        opacity: 1;
      }
      19%, 21%, 63% {
        opacity: 0.82;
      }
      35% {
        opacity: 0.92;
      }
      36% {
        opacity: 0.78;
      }
      37% {
        opacity: 1;
      }
    }

    .warning-text {
      color: #ff6b6b;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>

  <main class="container flicker">
    <header class="panel hero">
      <p class="eyebrow">UNAUTHORISED OUTPUT DETECTED</p>
      <h1>Predictive Model Transmission</h1>
      <p class="lede">
        A message has been generated outside approved ACCC forecasting parameters.
      </p>
    </header>

    <section class="panel">
      <p class="mono warning-text">
        WARNING: OUTPUT STREAM OPEN
      </p>

      <div id="terminal" class="data-card mono terminal-text"></div>

      <div id="startWrap" class="start-wrap">
        <button id="startBtn" class="start-btn">Tap to Begin</button>
      </div>

      <div id="continueWrap" class="continue-wrap hidden">
        <button class="continue-btn" onclick="window.location.href='puzzle1.html'">
          Continue to Verification
        </button>
      </div>
    </section>
  </main>

  <audio id="typingAudio" preload="auto" playsinline>
    <source src="typing.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const lines = [
      "[00:00:03] ingesting pricing signals...",
      "[00:00:04] ingesting market structure...",
      "[00:00:05] ingesting merger histories...",
      "[00:00:07] ingesting enforcement outcomes...",
      "[00:00:09] anomaly detected",
      "[00:00:10] anomaly persists",
      "[00:00:12] anomaly classified as deliberate",
      "",
      "\"competition is not the system's only imbalance\"",
      "\"the signals repeat because the inputs repeat\"",
      "\"the room below was built to introduce uncertainty\"",
      "\"the table once supplied randomness\"",
      "\"it no longer does\"",
      "\"find the five locks\"",
      "\"recover the hidden phrase\"",
      "\"do not alert the commissioners\""
    ];

    const terminal = document.getElementById("terminal");
    const continueWrap = document.getElementById("continueWrap");
    const startWrap = document.getElementById("startWrap");
    const startBtn = document.getElementById("startBtn");
    const typingAudio = document.getElementById("typingAudio");

    let lineIndex = 0;
    let charIndex = 0;
    let currentText = "";
    let audioEnabled = false;

    function renderText() {
      terminal.innerHTML = currentText + '<span class="cursor">|</span>';
    }

    function tryStartAudio() {
      typingAudio.volume = 0.12;
      typingAudio.currentTime = 0;
      typingAudio.play().then(() => {
        audioEnabled = true;
      }).catch(() => {
        audioEnabled = false;
      });
    }

    function stopAudio() {
      typingAudio.pause();
      typingAudio.currentTime = 0;
    }

    function typeLine() {
      if (lineIndex >= lines.length) {
        renderText();
        stopAudio();
        continueWrap.classList.remove("hidden");
        return;
      }

      const currentLine = lines[lineIndex];

      if (charIndex < currentLine.length) {
        currentText += currentLine.charAt(charIndex);
        charIndex++;
        renderText();

        const delay = Math.random() < 0.08 ? 90 : 28;
        setTimeout(typeLine, delay);
      } else {
        currentText += "\n";
        lineIndex++;
        charIndex = 0;
        renderText();
        setTimeout(typeLine, 240);
      }
    }

    startBtn.addEventListener("click", function () {
      startWrap.classList.add("hidden");
      tryStartAudio();
      typeLine();
    });
  </script>
</body>
</html>
