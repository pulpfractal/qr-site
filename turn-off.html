<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outcome: Turn Off</title>

  <style>
    :root {
      --teal: #20d6c7;
      --purple: #8d5cff;
      --panel: rgba(3, 18, 32, 0.78);
      --text: #d7fff9;
      --danger: #ff6b6b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 80, 80, 0.2), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(141, 92, 255, 0.2), transparent 30%),
        linear-gradient(135deg, #020817 0%, #1a0505 50%, #000000 100%);
    }

    .scanlines {
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.02),
        rgba(255,255,255,0.02) 1px,
        transparent 1px,
        transparent 4px
      );
      opacity: 0.5;
    }

    .container {
      width: min(900px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 4rem 0;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(255, 100, 100, 0.25);
      border-radius: 18px;
      padding: 2.5rem;
      box-shadow:
        0 0 40px rgba(255, 80, 80, 0.15),
        0 0 60px rgba(141, 92, 255, 0.1);
      backdrop-filter: blur(10px);
    }

    .title {
      font-size: clamp(1.8rem, 4vw, 3rem);
      letter-spacing: 0.05em;
      margin-bottom: 2rem;
      color: var(--danger);
      text-shadow: 0 0 18px rgba(255, 80, 80, 0.35);
      line-height: 1.6;
    }

    .image {
      width: 100%;
      max-width: 600px;
      border-radius: 16px;
      border: 1px solid rgba(255, 80, 80, 0.3);
      box-shadow: 0 0 30px rgba(255, 80, 80, 0.25);
    }
  </style>
</head>

<body>
  <div class="scanlines"></div>

  <main class="container">
    <section class="panel">
      <div class="title">
        Oh dear, you chose in vain to halt the inevitable and looks like the Third Law of Robotics has some wiggle room
      </div>

      <img class="image" src="explosion.png" alt="Explosion ending">
    </section>
  </main>
</body>
</html>
