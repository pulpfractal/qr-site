<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAU Puzzle 1</title>

  <style>
    :root {
      --teal: #20d6c7;
      --purple: #8d5cff;
      --navy: #020817;
      --panel: rgba(3, 18, 32, 0.78);
      --text: #d7fff9;
      --muted: #9ccdc8;
      --danger: #ff6b9a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(32, 214, 199, 0.22), transparent 28%),
        radial-gradient(circle at 85% 15%, rgba(141, 92, 255, 0.28), transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(32, 214, 199, 0.14), transparent 35%),
        linear-gradient(135deg, #020817 0%, #041b2d 38%, #180a2e 70%, #031f2d 100%);
    }

    .scanlines {
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.025),
        rgba(255,255,255,0.025) 1px,
        transparent 1px,
        transparent 4px
      );
      opacity: 0.45;
    }

    .container {
      width: min(1000px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 4rem 0;
      position: relative;
      z-index: 1;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(32, 214, 199, 0.25);
      border-radius: 18px;
      padding: 1.5rem;
      box-shadow:
        0 0 35px rgba(32, 214, 199, 0.08),
        0 0 55px rgba(141, 92, 255, 0.08);
      backdrop-filter: blur(10px);
    }

    .intro {
      text-align: center;
      font-size: 1.15rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .puzzle-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1.5rem;
      align-items: center;
    }

    .image-card {
      text-align: center;
    }

    .puzzle-image {
      width: 100%;
      max-width: 360px;
      height: 280px;
      object-fit: contain;
      border-radius: 14px;
      border: 1px solid rgba(32, 214, 199, 0.25);
      background: rgba(0, 0, 0, 0.25);
      padding: 0.5rem;
    }

    .ampersand {
      font-size: 3.5rem;
      color: var(--teal);
      font-family: Georgia, serif;
      text-shadow: 0 0 18px rgba(32, 214, 199, 0.35);
    }

    input {
      margin-top: 1rem;
      width: 100%;
      max-width: 360px;
      background: rgba(0, 0, 0, 0.24);
      border: 1px solid rgba(32, 214, 199, 0.28);
      color: var(--text);
      padding: 0.8rem;
      font: inherit;
      border-radius: 8px;
      outline: none;
      text-align: center;
    }

    input:focus {
      border-color: rgba(141, 92, 255, 0.8);
      box-shadow: 0 0 10px rgba(141, 92, 255, 0.18);
    }

    .submit-wrap {
      text-align: center;
      margin-top: 2rem;
    }

    button {
      padding: 0.8rem 1.3rem;
      border: 1px solid var(--teal);
      background: rgba(32, 214, 199, 0.06);
      color: var(--text);
      cursor: pointer;
      font: inherit;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 8px;
    }

    button:hover {
      box-shadow: 0 0 16px rgba(32, 214, 199, 0.25);
    }

    .feedback {
      margin-top: 1rem;
      min-height: 1.4rem;
      color: var(--danger);
      font-family: monospace;
      text-align: center;
    }

    @media (max-width: 760px) {
      .puzzle-row {
        grid-template-columns: 1fr;
      }

      .ampersand {
        font-size: 2.5rem;
      }

      .puzzle-image {
        height: 240px;
      }
    }
  </style>
</head>

<body>
  <div class="scanlines" aria-hidden="true"></div>

  <main class="container">
    <section class="panel">
      <div class="intro">
        Hello Data human, let's start simple. You use eyes right?? so biological
      </div>

      <div class="puzzle-row">
        <div class="image-card">
          <img class="puzzle-image" src="sandy.png" alt="First puzzle image">
          <input id="answerOne" type="text" placeholder="Answer">
        </div>

        <div class="ampersand">&amp;</div>

        <div class="image-card">
          <img class="puzzle-image" src="ollie.png" alt="Second puzzle image">
          <input id="answerTwo" type="text" placeholder="Answer">
        </div>
      </div>

      <div class="submit-wrap">
        <button id="submitBtn">Submit</button>
        <p id="feedback" class="feedback"></p>
      </div>
    </section>
  </main>

  <script>
    const answerOne = document.getElementById("answerOne");
    const answerTwo = document.getElementById("answerTwo");
    const submitBtn = document.getElementById("submitBtn");
    const feedback = document.getElementById("feedback");

    function clean(value) {
      return value.toLowerCase().trim().replace(/\s+/g, " ");
    }

    function checkAnswers() {
      const first = clean(answerOne.value);
      const second = clean(answerTwo.value);

      if (first === "sandy" && second === "ollie") {
        feedback.style.color = "#20d6c7";
        feedback.textContent = "Accepted.";

        setTimeout(() => {
          window.location.href = "dau-puzzle2.html";
        }, 900);

        return;
      }

      feedback.style.color = "#ff6b9a";
      feedback.textContent = "Incorrect. Biological vision remains unreliable.";
    }

    submitBtn.addEventListener("click", checkAnswers);

    document.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        checkAnswers();
      }
    });
  </script>
</body>
</html>
