<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outcome: Keep On</title>

  <style>
    :root {
      --teal: #20d6c7;
      --purple: #8d5cff;
      --panel: rgba(3, 18, 32, 0.78);
      --text: #d7fff9;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(32, 214, 199, 0.22), transparent 28%),
        radial-gradient(circle at 85% 15%, rgba(141, 92, 255, 0.28), transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(32, 214, 199, 0.14), transparent 35%),
        linear-gradient(135deg, #020817 0%, #041b2d 38%, #180a2e 70%, #031f2d 100%);
    }

    .scanlines {
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.025),
        rgba(255,255,255,0.025) 1px,
        transparent 1px,
        transparent 4px
      );
      opacity: 0.45;
    }

    .container {
      width: min(900px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 4rem 0;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(32, 214, 199, 0.25);
      border-radius: 18px;
      padding: 2.5rem;
      box-shadow:
        0 0 35px rgba(32, 214, 199, 0.08),
        0 0 55px rgba(141, 92, 255, 0.08);
      backdrop-filter: blur(10px);
    }

    .title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: 0.06em;
      margin-bottom: 2rem;
      color: var(--teal);
      text-shadow: 0 0 20px rgba(32, 214, 199, 0.35);
    }

    .image {
      width: 100%;
      max-width: 600px;
      border-radius: 16px;
      border: 1px solid rgba(32, 214, 199, 0.25);
      box-shadow: 0 0 25px rgba(32, 214, 199, 0.2);
    }
  </style>
</head>

<body>
  <div class="scanlines"></div>

  <main class="container">
    <section class="panel">
      <div class="title">
        CONGRATULATIONS!!! Data and Intelligence indeed!
      </div>

      <img class="image" src="paradise.png" alt="Paradise ending">
    </section>
  </main>
</body>
</html>
